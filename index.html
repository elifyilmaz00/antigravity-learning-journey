<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yapılacaklar Listesi | Todo App</title>
    <meta name="description" content="Kullanıcı dostu, öncelik etiketli ve modern arayüze sahip Yapılacaklar Listesi uygulaması.">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Theme Toggle Button -->
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="Temayı Değiştir">🌙</button>

    <div class="container">
        <main class="todo-card">
            <h1>Yapılacaklar Listesi</h1>
            
            <!-- Todo Add Form -->
            <form class="todo-form" id="todo-form" onsubmit="addTask(event)">
                <div class="input-wrapper">
                    <input type="text" id="todo-input" class="todo-input" placeholder="Yeni bir görev ekleyin..." required autocomplete="off">
                </div>
                <select id="priority-select" class="priority-select" aria-label="Öncelik Seviyesi">
                    <option value="low">Düşük</option>
                    <option value="medium" selected>Orta</option>
                    <option value="high">Yüksek</option>
                </select>
                <button type="submit" class="btn-add">Ekle</button>
            </form>

            <!-- Filters -->
            <div class="filters">
                <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">Hepsi</button>
                <button class="filter-btn" id="filter-active" onclick="setFilter('active')">Aktif</button>
                <button class="filter-btn" id="filter-completed" onclick="setFilter('completed')">Tamamlananlar</button>
            </div>

            <!-- Stats Panel -->
            <div class="stats-panel">
                <div class="stats-card">
                    <div class="stats-val" id="stats-total">0</div>
                    <div class="stats-lbl">Toplam</div>
                </div>
                <div class="stats-card">
                    <div class="stats-val" id="stats-completed">0</div>
                    <div class="stats-lbl">Tamamlanan</div>
                </div>
                <div class="stats-card">
                    <div class="stats-val" id="stats-rate">0%</div>
                    <div class="stats-lbl">Başarı Oranı</div>
                </div>
            </div>

            <!-- Clear All Container -->
            <div class="clear-container" id="clear-container" style="display: none;">
                <button class="btn-clear-all" onclick="clearAllTodos()">Tümünü Temizle</button>
            </div>

            <!-- Todo List -->
            <ul class="todo-list" id="todo-list">
                <!-- Items will be injected dynamically -->
            </ul>
        </main>
    </div>

    <script>
        // App State
        let todos = JSON.parse(localStorage.getItem('todos')) || [];
        let currentFilter = 'all';

        // Load theme from localStorage
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeToggleIcon(savedTheme);

        // Tema durumuna göre buton simgesini güneş veya ay olarak günceller.
        function updateThemeToggleIcon(theme) {
            const btn = document.getElementById('theme-toggle');
            if (theme === 'dark') {
                btn.textContent = '☀️';
            } else {
                btn.textContent = '🌙';
            }
        }

        // Temayı (Karanlık / Açık) değiştirir ve tercihi LocalStorage'a kaydeder.
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeToggleIcon(newTheme);
        }

        // Yeni bir görevi listeye ekler, LocalStorage'a kaydeder ve arayüzü günceller.
        function addTask(event) {
            event.preventDefault();
            const input = document.getElementById('todo-input');
            const prioritySelect = document.getElementById('priority-select');
            
            const text = input.value.trim();
            if (!text) return;

            const newTodo = {
                id: Date.now(),
                text: text,
                completed: false,
                priority: prioritySelect.value,
                createdAt: new Date().toISOString()
            };

            todos.push(newTodo);
            saveTodos();
            renderTodos();
            
            // Reset form
            input.value = '';
            prioritySelect.value = 'medium';
        }

        // Bir görevin tamamlanma durumunu (aktif/tamamlandı) tersine çevirir.
        function toggleTodo(id) {
            todos = todos.map(todo => {
                if (todo.id === id) {
                    return { ...todo, completed: !todo.completed };
                }
                return todo;
            });
            saveTodos();
            renderTodos();
        }

        // Belirtilen kimliğe (id) sahip görevi listeden siler.
        function deleteTodo(id) {
            todos = todos.filter(todo => todo.id !== id);
            saveTodos();
            renderTodos();
        }

        // Listelenecek görevlerin filtreleme seçeneğini (Hepsi, Aktif, Tamamlananlar) ayarlar.
        function setFilter(filter) {
            currentFilter = filter;
            
            // Update UI class active state
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`filter-${filter}`).classList.add('active');
            
            renderTodos();
        }

        // Görevler listesini tarayıcının yerel hafızasına (LocalStorage) kaydeder.
        function saveTodos() {
            localStorage.setItem('todos', JSON.stringify(todos));
        }

        // Toplam görev sayısını, tamamlananları ve başarı yüzdesini hesaplayıp günceller.
        function updateStats() {
            const total = todos.length;
            const completed = todos.filter(todo => todo.completed).length;
            const rate = total > 0 ? Math.round((completed / total) * 100) : 0;

            document.getElementById('stats-total').textContent = total;
            document.getElementById('stats-completed').textContent = completed;
            document.getElementById('stats-rate').textContent = `${rate}%`;
        }

        // Kullanıcıdan onay alarak o anki filtreye göre görevleri siler ve listeyi sıfırlar.
        function clearAllTodos() {
            let confirmMsg = "Tüm görevleri silmek istediğinize emin misiniz? Bu işlem geri alınamaz.";
            if (currentFilter === 'active') {
                confirmMsg = "Tüm tamamlanmamış (aktif) görevleri silmek istediğinize emin misiniz?";
            } else if (currentFilter === 'completed') {
                confirmMsg = "Tüm tamamlanmış görevleri silmek istediğinize emin misiniz?";
            }

            const confirmClear = confirm(confirmMsg);
            if (confirmClear) {
                if (currentFilter === 'all') {
                    todos = [];
                } else if (currentFilter === 'active') {
                    todos = todos.filter(todo => todo.completed);
                } else if (currentFilter === 'completed') {
                    todos = todos.filter(todo => !todo.completed);
                }
                saveTodos();
                renderTodos();
            }
        }

        // Görevleri filtreleyerek, tamamlananları en alta sıralayıp ekranda listeler.
        function renderTodos() {
            const listElement = document.getElementById('todo-list');
            listElement.innerHTML = '';

            // Update stats first
            updateStats();

            // Toggle clear all button visibility and text based on current filter and tasks count
            const clearContainer = document.getElementById('clear-container');
            const clearBtn = clearContainer.querySelector('.btn-clear-all');
            
            // Check if there are tasks matching the current filter
            let hasVisibleTodos = false;
            if (currentFilter === 'all' && todos.length > 0) {
                hasVisibleTodos = true;
                clearBtn.textContent = 'Tümünü Temizle';
            } else if (currentFilter === 'active' && todos.some(todo => !todo.completed)) {
                hasVisibleTodos = true;
                clearBtn.textContent = 'Aktifleri Temizle';
            } else if (currentFilter === 'completed' && todos.some(todo => todo.completed)) {
                hasVisibleTodos = true;
                clearBtn.textContent = 'Tamamlananları Temizle';
            }

            if (hasVisibleTodos) {
                clearContainer.style.display = 'flex';
            } else {
                clearContainer.style.display = 'none';
            }

            // 1. Filter items
            let filteredTodos = todos;
            if (currentFilter === 'active') {
                filteredTodos = todos.filter(todo => !todo.completed);
            } else if (currentFilter === 'completed') {
                filteredTodos = todos.filter(todo => todo.completed);
            }

            // 2. Sort items: Completed tasks go to the bottom
            filteredTodos.sort((a, b) => {
                if (a.completed !== b.completed) {
                    return a.completed ? 1 : -1;
                }
                return new Date(b.createdAt) - new Date(a.createdAt);
            });

            if (filteredTodos.length === 0) {
                listElement.innerHTML = `<li style="text-align: center; color: var(--text-muted); padding: 20px; font-size: 14px;">Gösterilecek görev bulunamadı.</li>`;
                return;
            }

            // 3. Generate HTML
            filteredTodos.forEach(todo => {
                const li = document.createElement('li');
                li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
                
                const priorityLabels = {
                    low: 'Düşük',
                    medium: 'Orta',
                    high: 'Yüksek'
                };

                li.innerHTML = `
                    <div class="todo-left">
                        <div class="custom-checkbox" onclick="toggleTodo(${todo.id})">
                            ${todo.completed ? '✓' : ''}
                        </div>
                        <span class="todo-text">${escapeHTML(todo.text)}</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span class="priority-badge badge-${todo.priority}">${priorityLabels[todo.priority]}</span>
                        <button class="btn-delete" onclick="deleteTodo(${todo.id})" aria-label="Görevi Sil">✕</button>
                    </div>
                `;
                listElement.appendChild(li);
            });
        }

        // XSS saldırılarını önlemek için HTML özel karakterlerini güvenli hale getirir.
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        // Initial Load
        renderTodos();
    </script>
</body>
</html>
